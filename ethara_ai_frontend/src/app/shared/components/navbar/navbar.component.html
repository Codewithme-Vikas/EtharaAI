<header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex h-16 w-full max-w-6xl items-center gap-3 px-4">
        <a routerLink="/dashboard"
            class="inline-flex items-center gap-2 rounded-full px-3 py-2 transition hover:bg-slate-50">
            <span class="text-xl font-bold tracking-tight text-slate-800 transition group-hover:text-slate-900">
                {{ title }}
            </span>
            <span
                class="rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-[0.24em] text-slate-500">
                Pro
            </span>
        </a>

        <div class="flex-1 text-center">
            <span
                class="inline-flex items-center rounded-full bg-slate-100 px-3 py-1 text-sm font-medium text-slate-700 shadow-sm">
                {{ userName() || 'Guest' }}
            </span>
        </div>

        <nav class="flex items-center gap-2">
            @for (item of items; track item.route) {
            <a [routerLink]="item.route" routerLinkActive="text-black text-[16px]"
                [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
                class="rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">
                {{ item.label }}
            </a>
            }

            <button type="button"
                class="rounded-md text-red-600 px-3 py-2 text-sm font-medium hover:cursor-pointer hover:bg-slate-100"
                (click)="onLogout()">
                Logout
            </button>
        </nav>
    </div>
</header>
